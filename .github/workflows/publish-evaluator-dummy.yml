name: Publish Dummy Evaluator Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - clef26/causality-extraction/task2-evaluator-dummy/**

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push evaluator image
        uses: docker/build-push-action@v6
        with:
          context: clef26/causality-extraction/task2-evaluator-dummy
          file: clef26/causality-extraction/task2-evaluator-dummy/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/evaluator-dummy:clef26